            { id: 49, type: 'tf_table', text: "Tentukan Benar atau Salah berkaitan dengan integrasi nasional dan ancaman disintegrasi!", statements: [ { id: 's1', t: "Sistem otonomi daerah memberikan ruang bagi daerah untuk berkembang namun tetap dalam bingkai NKRI.", a: 'Benar' }, { id: 's2', t: "Pembangunan infrastruktur yang sentralistis (hanya terpusat di satu pulau) justru mendukung Wawasan Nusantara.", a: 'Salah' }, { id: 's3', t: "Integrasi nasional adalah proses menyatukan perbedaan budaya dan kelompok sosial ke dalam kesatuan wilayah.", a: 'Benar' }, { id: 's4', t: "Etnosentrisme merupakan sikap fanatisme sempit yang sangat baik untuk memperkuat integrasi nasional.", a: 'Salah' }, { id: 's5', t: "Ancaman terhadap satu pulau di Indonesia pada hakikatnya adalah ancaman bagi seluruh wilayah Indonesia.", a: 'Benar' } ] },
            { id: 50, type: 'tf_table', text: "Tentukan Benar atau Salah terkait strategi cerdas dalam mengatasi tantangan Wawasan Nusantara!", statements: [ { id: 's1', t: "Mengisolasi diri dari pergaulan internasional adalah cara paling efektif untuk menjaga kemurnian budaya asli.", a: 'Salah' }, { id: 's2', t: "Pemerataan pembangunan ke daerah tertinggal efektif mencegah rasa ketidakadilan yang memicu separatisme.", a: 'Benar' }, { id: 's3', t: "Pendidikan Pancasila dan Kewarganegaraan di sekolah memegang peran sentral dalam internalisasi Wawasan Nusantara.", a: 'Benar' }, { id: 's4', t: "Penyelesaian seluruh konflik kebangsaan selalu membutuhkan pendekatan militer sebagai solusi tunggal.", a: 'Salah' }, { id: 's5', t: "Peningkatan literasi digital di masyarakat sangat krusial untuk mencegah adu domba berkedok SARA.", a: 'Benar' } ] }
        ];

        // ================= HELPER FUNCTIONS =================
        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        const generateShuffledQuestions = () => {
            let questions = shuffleArray(rawQuestionsData).map(q => {
                if (q.type === 'mc' || q.type === 'ms') {
                    return { ...q, options: shuffleArray(q.options) };
                }
                if(q.type === 'tf_table') {
                    return { ...q, statements: shuffleArray(q.statements) };
                }
                return q;
            });
            return questions;
        };

        // ================= CUSTOM MODALS =================
        const AlertModal = ({ show, title, message, onClose }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                    <div className="bg-white rounded-lg p-6 max-w-sm w-full mx-4 shadow-2xl">
                        <h3 className="text-xl font-bold mb-2 text-red-600">{title}</h3>
                        <p className="text-gray-700 mb-6">{message}</p>
                        <div className="flex justify-end">
                            <button onClick={onClose} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Mengerti</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ show, title, message, onConfirm, onCancel }) => {
            if (!show) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
                    <div className="bg-white rounded-lg p-6 max-w-sm w-full mx-4 shadow-2xl">
                        <h3 className="text-xl font-bold mb-2 text-gray-900">{title}</h3>
                        <p className="text-gray-700 mb-6">{message}</p>
                        <div className="flex justify-end space-x-3">
                            <button onClick={onCancel} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded font-medium border border-gray-300">Batal</button>
                            <button onClick={onConfirm} className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Kumpulkan</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ================= MAIN COMPONENT =================
        const App = () => {
            const [stage, setStage] = React.useState('login'); // login, resume-prompt, exam, finished
            const [userData, setUserData] = React.useState({ name: '', classStr: '', date: new Date().toISOString().split('T')[0] });
            const [questions, setQuestions] = React.useState([]);
            const [answers, setAnswers] = React.useState({});
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [timeLeft, setTimeLeft] = React.useState(DURATION_MINUTES * 60);
            const [cheatingCount, setCheatingCount] = React.useState(0);
            const [scoreInfo, setScoreInfo] = React.useState(null);

            // Modal States
            const [alertState, setAlertState] = React.useState({ show: false, title: '', msg: '' });
            const [confirmState, setConfirmState] = React.useState(false);

            // Check for saved session
            React.useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    setStage('resume-prompt');
                }
            }, []);

            // Anti Cheat (Visibility & Fullscreen)
            React.useEffect(() => {
                if (stage !== 'exam') return;

                const handleViolation = (reason) => {
                    setCheatingCount(prev => {
                        const newCount = prev + 1;
                        if (newCount === 1) {
                            setAlertState({ show: true, title: 'Peringatan Pelanggaran!', msg: `Anda terdeteksi ${reason}. Ini adalah peringatan PERTAMA. Pelanggaran kedua akan menghentikan ujian otomatis.` });
                        } else if (newCount >= 2) {
                            setAlertState({ show: true, title: 'Ujian Dihentikan', msg: 'Batas pelanggaran tercapai. Ujian Anda otomatis dikumpulkan.' });
                            submitExam(newCount, "Auto-Submit: Terlalu banyak pelanggaran (Curang)");
                        }
                        return newCount;
                    });
                };

                const handleVisChange = () => { if (document.hidden) handleViolation("berpindah tab / mengecilkan browser"); };
                const handleFsChange = () => { if (!document.fullscreenElement) handleViolation("keluar dari mode layar penuh (fullscreen)"); };

                document.addEventListener('visibilitychange', handleVisChange);
                document.addEventListener('fullscreenchange', handleFsChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisChange);
                    document.removeEventListener('fullscreenchange', handleFsChange);
                };
            }, [stage]);

            // Timer & Auto Save
            React.useEffect(() => {
                if (stage === 'exam' && timeLeft > 0) {
                    const timer = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(timer);
                                setAlertState({ show: true, title: 'Waktu Habis', msg: 'Waktu ujian telah habis. Jawaban dikumpulkan otomatis.' });
                                submitExam(cheatingCount, "Auto-Submit: Waktu Habis");
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                    return () => clearInterval(timer);
                }
            }, [stage, timeLeft]);

            React.useEffect(() => {
                if (stage === 'exam') {
                    const saveData = { userData, questions, answers, timeLeft, cheatingCount };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
                }
            }, [answers, timeLeft, cheatingCount, stage]);

            // Handlers
            const startExam = (isResume) => {
                if (!isResume) {
                    if (!userData.name || !userData.classStr) {
                        setAlertState({ show: true, title: 'Data Belum Lengkap', msg: 'Harap isi Nama dan Kelas terlebih dahulu.' });
                        return;
                    }
                    setQuestions(generateShuffledQuestions());
                    setAnswers({});
                    setTimeLeft(DURATION_MINUTES * 60);
                    setCheatingCount(0);
                } else {
                    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                    setUserData(saved.userData);
                    setQuestions(saved.questions);
                    setAnswers(saved.answers || {});
                    setTimeLeft(saved.timeLeft);
                    setCheatingCount(saved.cheatingCount || 0);
                }
                
                setStage('exam');
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(err => console.log("Fullscreen blocked"));
                }
            };

            const handleAnswerChange = (qId, type, val, statementId = null) => {
                setAnswers(prev => {
                    const newAns = { ...prev };
                    if (type === 'mc') {
                        newAns[qId] = val; // val is option text
                    } else if (type === 'ms') {
                        const curr = newAns[qId] || [];
                        if (curr.includes(val)) {
                            newAns[qId] = curr.filter(item => item !== val);
                        } else {
                            newAns[qId] = [...curr, val];
                        }
                    } else if (type === 'tf_table') {
                        if (!newAns[qId]) newAns[qId] = {};
                        newAns[qId][statementId] = val; // val is "Benar" or "Salah"
                    }
                    return newAns;
                });
            };

            const calculateScore = () => {
                let correctCount = 0;
                let totalItems = 0;

                questions.forEach(q => {
                    if (q.type === 'mc') {
                        totalItems++;
                        const correctOpt = q.options.find(o => o.c).t;
                        if (answers[q.id] === correctOpt) correctCount++;
                    } else if (q.type === 'ms') {
                        totalItems++;
                        const correctOpts = q.options.filter(o => o.c).map(o => o.t);
                        const userAns = answers[q.id] || [];
                        // Correct if lengths match and all correct selected
                        const isCorrect = userAns.length === correctOpts.length && userAns.every(v => correctOpts.includes(v));
                        if (isCorrect) correctCount++;
                    } else if (q.type === 'tf_table') {
                        q.statements.forEach(stmt => {
                            totalItems++;
                            const userAns = (answers[q.id] || {})[stmt.id];
                            if (userAns === stmt.a) correctCount++;
                        });
                    }
                });

                return Math.round((correctCount / totalItems) * 100);
            };

            const submitExam = (cheatTotal = cheatingCount, note = "Normal Submit") => {
                const finalScore = calculateScore();
                const payload = {
                    nama: userData.name,
                    kelas: userData.classStr,
                    tanggal: userData.date,
                    skor: finalScore,
                    pelanggaran: cheatTotal,
                    keterangan: note,
                    debug: JSON.stringify(answers)
                };

                fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                }).catch(err => console.error("Fetch error", err));

                localStorage.removeItem(STORAGE_KEY);
                setScoreInfo(finalScore);
                setStage('finished');
                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(err => {});
                }
            };

            const formatTime = (sec) => {
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = sec % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            // Prevent Copy Paste Context Menu
            const preventDefaults = (e) => e.preventDefault();

            // Render Views
            if (stage === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                        <AlertModal show={alertState.show} title={alertState.title} message={alertState.msg} onClose={() => setAlertState({show:false})} />
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full">
                            <h1 className="text-2xl font-bold text-center text-blue-600 mb-2">Portal Ujian CBT</h1>
                            <p className="text-center text-gray-500 text-sm mb-6">{SUBJECT} - KELAS {GRADE_LEVEL}</p>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                                    <input type="text" className="w-full border border-gray-300 p-2 rounded focus:ring-blue-500 focus:border-blue-500" placeholder="Masukkan Nama" value={userData.name} onChange={(e) => setUserData({...userData, name: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Kelas</label>
                                    <input type="text" className="w-full border border-gray-300 p-2 rounded focus:ring-blue-500 focus:border-blue-500" placeholder="Contoh: VIII-A" value={userData.classStr} onChange={(e) => setUserData({...userData, classStr: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Ujian</label>
                                    <input type="date" className="w-full border border-gray-300 p-2 rounded focus:ring-blue-500 focus:border-blue-500" value={userData.date} onChange={(e) => setUserData({...userData, date: e.target.value})} />
                                </div>
                                <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 text-xs p-3 rounded mt-4">
                                    <p className="font-semibold mb-1">Peringatan Sistem Anti-Curang:</p>
                                    <ul className="list-disc pl-4 space-y-1">
                                        <li>Browser akan otomatis masuk ke layar penuh.</li>
                                        <li>Dilarang keluar dari layar penuh atau pindah tab/aplikasi lain.</li>
                                        <li>Pelanggaran ke-2 akan menyebabkan ujian terhenti otomatis.</li>
                                    </ul>
                                </div>
                                <button onClick={() => startExam(false)} className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-6 shadow-md">
                                    MULAI UJIAN
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (stage === 'resume-prompt') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
                            <h2 className="text-xl font-bold text-yellow-600 mb-4">Sesi Ujian Tersimpan Ditemukan!</h2>
                            <p className="text-gray-600 mb-6">Sistem mendeteksi Anda belum menyelesaikan ujian sebelumnya. Apakah Anda ingin melanjutkan?</p>
                            <div className="space-y-3">
                                <button onClick={() => startExam(true)} className="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Lanjutkan Ujian</button>
                                <button onClick={() => { localStorage.removeItem(STORAGE_KEY); setStage('login'); }} className="w-full bg-red-100 text-red-600 font-bold py-2 rounded hover:bg-red-200">Mulai Ulang (Hapus Progres)</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (stage === 'finished') {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
                            <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="check-circle" className="w-10 h-10"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">Ujian Selesai!</h1>
                            <p className="text-gray-600 mb-6">Terima kasih, data dan jawaban Anda telah berhasil dikirim ke server.</p>
                            <div className="bg-gray-50 p-4 rounded-lg mb-6 text-left space-y-2 border">
                                <p><span className="font-semibold text-gray-700">Nama:</span> {userData.name}</p>
                                <p><span className="font-semibold text-gray-700">Kelas:</span> {userData.classStr}</p>
                                <p><span className="font-semibold text-gray-700">Skor:</span> <span className="text-blue-600 font-bold text-xl">{scoreInfo}</span></p>
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full bg-gray-200 text-gray-800 font-bold py-2 rounded hover:bg-gray-300">Kembali ke Awal</button>
                        </div>
                    </div>
                );
            }

            // Exam View
            const currentQ = questions[currentIndex];
            const hasAnswered = (qId) => {
                const q = questions.find(x => x.id === qId);
                const ans = answers[qId];
                if (!ans) return false;
                if (q.type === 'mc') return true;
                if (q.type === 'ms') return ans.length > 0;
                if (q.type === 'tf_table') return Object.keys(ans).length === q.statements.length;
                return false;
            };

            return (
                <div className="flex h-screen bg-gray-100 select-none" onCopy={preventDefaults} onContextMenu={preventDefaults} onSelectStart={preventDefaults}>
                    <AlertModal show={alertState.show} title={alertState.title} message={alertState.msg} onClose={() => {
                        setAlertState({show:false});
                        if (stage === 'finished') return; // if it was auto-submit
                    }} />
                    <ConfirmModal show={confirmState} title="Konfirmasi Kumpul" message="Apakah Anda yakin ingin menyelesaikan ujian? Anda tidak dapat mengubah jawaban setelah ini." onConfirm={() => { setConfirmState(false); submitExam(); }} onCancel={() => setConfirmState(false)} />

                    {/* Left: Question Area */}
                    <div className="flex-1 flex flex-col max-w-4xl mx-auto w-full h-full p-4 relative">
                        {/* Header Info */}
                        <div className="bg-white rounded-lg shadow px-6 py-4 flex justify-between items-center mb-4">
                            <div>
                                <h2 className="font-bold text-gray-800">{SUBJECT}</h2>
                                <p className="text-sm text-gray-500">{userData.name} | Kelas: {userData.classStr}</p>
                            </div>
                            <div className="flex items-center space-x-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-lg font-mono font-bold text-xl border border-blue-200">
                                <span>{formatTime(timeLeft)}</span>
                            </div>
                        </div>

                        {/* Question Box */}
                        <div className="bg-white rounded-lg shadow p-6 flex-1 overflow-y-auto hide-scrollbar mb-4">
                            <div className="flex space-x-4 mb-6">
                                <div className="w-10 h-10 bg-blue-600 text-white flex items-center justify-center rounded-lg font-bold text-lg shrink-0">
                                    {currentIndex + 1}
                                </div>
                                <div className="text-lg text-gray-800 leading-relaxed font-medium pt-1">
                                    {currentQ.text}
                                    {currentQ.image && (
                                        <img src={currentQ.image} alt="Soal" className="mt-4 max-w-full rounded border shadow-sm" />
                                    )}
                                </div>
                            </div>

                            <div className="pl-14 space-y-3">
                                {/* Type: Multiple Choice */}
                                {currentQ.type === 'mc' && currentQ.options.map((opt, i) => (
                                    <label key={i} className={`flex items-center p-3 border rounded-lg cursor-pointer transition-colors ${answers[currentQ.id] === opt.t ? 'bg-blue-50 border-blue-500' : 'hover:bg-gray-50 border-gray-200'}`}>
                                        <input type="radio" name={`q_${currentQ.id}`} checked={answers[currentQ.id] === opt.t} onChange={() => handleAnswerChange(currentQ.id, 'mc', opt.t)} className="w-5 h-5 text-blue-600 focus:ring-blue-500 mr-3" />
                                        <span className="text-gray-700">{opt.t}</span>
                                    </label>
                                ))}

                                {/* Type: Multiple Select (Kompleks) */}
                                {currentQ.type === 'ms' && currentQ.options.map((opt, i) => {
                                    const isChecked = (answers[currentQ.id] || []).includes(opt.t);
                                    return (
                                        <label key={i} className={`flex items-center p-3 border rounded-lg cursor-pointer transition-colors ${isChecked ? 'bg-blue-50 border-blue-500' : 'hover:bg-gray-50 border-gray-200'}`}>
                                            <input type="checkbox" checked={isChecked} onChange={() => handleAnswerChange(currentQ.id, 'ms', opt.t)} className="w-5 h-5 text-blue-600 focus:ring-blue-500 rounded mr-3" />
                                            <span className="text-gray-700">{opt.t}</span>
                                        </label>
                                    );
                                })}

                                {/* Type: TF Table */}
                                {currentQ.type === 'tf_table' && (
                                    <div className="overflow-x-auto border rounded-lg">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-100 text-gray-700 border-b">
                                                    <th className="p-3">Pernyataan</th>
                                                    <th className="p-3 text-center w-24">Benar</th>
                                                    <th className="p-3 text-center w-24">Salah</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {currentQ.statements.map((stmt, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50">
                                                        <td className="p-3 text-gray-700 text-sm">{stmt.t}</td>
                                                        <td className="p-3 text-center border-l">
                                                            <input type="radio" name={`q_${currentQ.id}_${stmt.id}`} checked={(answers[currentQ.id] || {})[stmt.id] === 'Benar'} onChange={() => handleAnswerChange(currentQ.id, 'tf_table', 'Benar', stmt.id)} className="w-5 h-5 text-green-500 focus:ring-green-500 cursor-pointer" />
                                                        </td>
                                                        <td className="p-3 text-center border-l">
                                                            <input type="radio" name={`q_${currentQ.id}_${stmt.id}`} checked={(answers[currentQ.id] || {})[stmt.id] === 'Salah'} onChange={() => handleAnswerChange(currentQ.id, 'tf_table', 'Salah', stmt.id)} className="w-5 h-5 text-red-500 focus:ring-red-500 cursor-pointer" />
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Navigation Footer */}
                        <div className="bg-white rounded-lg shadow px-6 py-4 flex justify-between items-center">
                            <button onClick={() => setCurrentIndex(prev => Math.max(0, prev - 1))} disabled={currentIndex === 0} className="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg disabled:opacity-50 font-medium hover:bg-gray-300 transition">
                                &laquo; Sebelumnya
                            </button>
                            
                            {currentIndex === questions.length - 1 ? (
                                <button onClick={() => setConfirmState(true)} className="px-6 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 shadow shadow-green-200 transition">
                                    Selesai & Kumpul
                                </button>
                            ) : (
                                <button onClick={() => setCurrentIndex(prev => Math.min(questions.length - 1, prev + 1))} className="px-5 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 shadow shadow-blue-200 transition">
                                    Selanjutnya &raquo;
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Right: Grid Area */}
                    <div className="w-80 bg-white border-l shadow-lg flex flex-col z-10 hidden md:flex">
                        <div className="p-4 border-b bg-gray-50">
                            <h3 className="font-bold text-gray-800 text-center">Navigasi Soal</h3>
                        </div>
                        <div className="p-4 flex-1 overflow-y-auto">
                            <div className="grid grid-cols-5 gap-2">
                                {questions.map((q, idx) => {
                                    const answered = hasAnswered(q.id);
                                    const isActive = idx === currentIndex;
                                    let btnClass = "w-10 h-10 rounded font-medium flex items-center justify-center transition border ";
                                    
                                    if (isActive) btnClass += "ring-2 ring-offset-2 ring-blue-500 ";
                                    if (answered) btnClass += "bg-blue-600 text-white border-blue-600 ";
                                    else btnClass += "bg-white text-gray-600 hover:bg-gray-100 border-gray-300";

                                    return (
                                        <button key={idx} onClick={() => setCurrentIndex(idx)} className={btnClass}>
                                            {idx + 1}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="p-4 border-t bg-gray-50 space-y-2 text-sm text-gray-600">
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 bg-blue-600 rounded"></div><span>Sudah Dijawab</span></div>
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 bg-white border border-gray-300 rounded"></div><span>Belum Dijawab</span></div>
                            <div className="flex items-center space-x-2"><div className="w-4 h-4 ring-2 ring-blue-500 rounded"></div><span>Posisi Saat Ini</span></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inisialisasi ikon Lucide
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
